<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujjwal Bhardwaj | Full Stack Developer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body class="light-theme">
    <div id="loader" class="loader">
        <div class="loader-content">
            <div class="loader-circle"></div>
            <p>DESIGNING EXPERIENCES</p>
        </div>
    </div>

    <div id="cursor" class="custom-cursor"></div>

    <nav class="skeuo-nav">
        <div class="nav-logo">UB</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section id="home" class="hero-section">
            <div class="parallax-bg" data-depth="0.1"></div>
            <div class="hero-content">
                <h1 class="reveal-text">UJJWAL BHARDWAJ</h1>
                <p class="hero-tagline reveal-text">Full-Stack Developer & AI Enthusiast</p>
                <div class="skeuo-button-container">
                    <button class="skeuo-button">Explore Work</button>
                </div>
            </div>
            <div class="hero-3d-card" id="heroCard">
                <div class="card-inner">
                    <div class="card-front">
                        <span>Creative Coding</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="projects" class="project-section">
            <h2 class="section-title">Projects</h2>
            <div class="project-grid">
                <div class="project-card skeuo-card">
                    <h3>Modern Calculator</h3>
                    <p>Sleek UI with advanced operations</p>
                </div>
                <div class="project-card skeuo-card">
                    <h3>Weather Dashboard</h3>
                    <p>Real-time data visualization</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
